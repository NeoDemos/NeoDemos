<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instellingen | NeoDemos</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .settings-container {
            max-width: 600px;
            margin: 2rem auto;
            background: #fff;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        }

        .settings-group {
            margin-bottom: 2rem;
        }

        .settings-group h3 {
            margin-bottom: 1rem;
            color: #2c3e50;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 0.5rem;
        }

        .form-control {
            margin-bottom: 1.5rem;
        }

        .form-control label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #4a5568;
        }

        .form-control select {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            font-family: inherit;
            font-size: 1rem;
        }

        .checkbox-group {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            font-weight: normal;
        }

        .checkbox-label input[type="checkbox"] {
            width: 1.2rem;
            height: 1.2rem;
            cursor: pointer;
        }

        .checkbox-label span.locked {
            color: #718096;
            font-style: italic;
            font-size: 0.9em;
        }

        .save-btn {
            background-color: #2c3e50;
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 4px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.2s;
        }

        .save-btn:hover {
            background-color: #1a252f;
        }

        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #38a169;
            color: #fff;
            text-align: center;
            border-radius: 4px;
            padding: 16px;
            position: fixed;
            z-index: 1;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-weight: 500;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein {
            from {
                bottom: 0;
                opacity: 0;
            }

            to {
                bottom: 30px;
                opacity: 1;
            }
        }

        @keyframes fadeout {
            from {
                bottom: 30px;
                opacity: 1;
            }

            to {
                bottom: 0;
                opacity: 0;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">Neo<span>Demos</span></div>
        <nav>
            <a href="/">Overzicht</a>
            <a href="/calendar">Kalender</a>
            <a href="/settings" style="font-weight: 600; color: #2c3e50;">Instellingen</a>
        </nav>
    </header>
    <main>
        <div class="settings-container">
            <h2>Uw Profiel</h2>
            <p style="color: #718096; margin-bottom: 2rem;">Configureer uw politieke voorkeuren voor gepersonaliseerde
                analyses.</p>

            <div class="settings-group">
                <h3>Politieke Partij</h3>
                <div class="form-control">
                    <label for="party-select">Selecteer uw partij</label>
                    <select id="party-select">
                        <option value="GroenLinks-PvdA">GroenLinks-PvdA</option>
                        <option value="VVD" disabled>VVD (Binnenkort)</option>
                        <option value="D66" disabled>D66 (Binnenkort)</option>
                    </select>
                </div>
            </div>

            <div class="settings-group">
                <h3>Commissies</h3>
                <p style="color: #718096; font-size: 0.9em; margin-bottom: 1rem;">Selecteer de commissies die u volgt.
                </p>
                <div class="checkbox-group">
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Bestuur, Organisatie, Financiën en Veiligheid (2022 - 2026)">
                        <span>Bestuur, Organisatie, Financiën en Veiligheid (2022 - 2026)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Mobiliteit, Haven, Economie en Klimaat (2022-2026)">
                        <span>Mobiliteit, Haven, Economie en Klimaat (2022-2026)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Bouwen, Wonen en Buitenruimte (2022-2026)">
                        <span>Bouwen, Wonen en Buitenruimte (2022-2026)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Zorg, Welzijn, Cultuur en Sport (2022 - 2026)">
                        <span>Zorg, Welzijn, Cultuur en Sport (2022 - 2026)</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Werk & Inkomen, Onderwijs, Samenleven, Schuldhulpverlening & Armoedebestrijding, NPRZ">
                        <span>Werk & Inkomen, Onderwijs, NPRZ</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb" value="Actualiteitenraad">
                        <span>Actualiteitenraad</span>
                    </label>
                    <label class="checkbox-label">
                        <input type="checkbox" class="committee-cb"
                            value="Commissie Welzijn, Wijken en Democratie (2022-2026)">
                        <span>Welzijn, Wijken en Democratie (2022-2026)</span>
                    </label>
                </div>
            </div>

            <button class="save-btn" onclick="saveSettings()">Wijzigingen Opslaan</button>
        </div>
        <div id="toast">Instellingen succesvol opgeslagen!</div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // Load saved settings from localStorage
            const savedParty = localStorage.getItem('neodemos_party');
            if (savedParty) {
                const partySelect = document.getElementById('party-select');
                for (let i = 0; i < partySelect.options.length; i++) {
                    if (partySelect.options[i].value === savedParty) {
                        partySelect.selectedIndex = i;
                        break;
                    }
                }
            }

            const savedCommitteesJson = localStorage.getItem('neodemos_committees');
            if (savedCommitteesJson) {
                try {
                    const savedCommittees = JSON.parse(savedCommitteesJson);
                    document.querySelectorAll('.committee-cb').forEach(cb => {
                        if (savedCommittees.includes(cb.value)) {
                            cb.checked = true;
                        }
                    });
                } catch (e) {
                    console.error("Error parsing saved committees", e);
                }
            }
        });

        function saveSettings() {
            const party = document.getElementById('party-select').value;
            localStorage.setItem('neodemos_party', party);

            const committees = ['Gemeenteraad']; // Always included
            document.querySelectorAll('.committee-cb:checked').forEach(cb => {
                committees.push(cb.value);
            });
            localStorage.setItem('neodemos_committees', JSON.stringify(committees));

            // Show toast
            const toast = document.getElementById('toast');
            toast.className = 'show';
            setTimeout(function () { toast.className = toast.className.replace('show', ''); }, 3000);
        }
    </script>
</body>

</html>

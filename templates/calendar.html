{% extends "base.html" %}

{% block content %}
<!-- Toolbar: year, search, view toggle -->
<div class="cal-toolbar">
    <select id="select-year" aria-label="Jaar">
        {% for y in available_years %}
        <option value="{{ y }}" {% if y == selected_year %}selected{% endif %}>{{ y }}</option>
        {% endfor %}
    </select>
    <input id="cal-search" class="cal-search" type="search"
           placeholder="Zoek vergadering..." value="{{ search_query }}"
           aria-label="Zoek vergaderingen">
    <div class="cal-view-toggle">
        <button id="btn-view-list" class="{{ 'active' if view != 'grid' }}" title="Lijstweergave" aria-label="Lijstweergave">&#9776;</button>
        <button id="btn-view-grid" class="{{ 'active' if view == 'grid' }}" title="Kalenderweergave" aria-label="Kalenderweergave">&#9638;</button>
    </div>
</div>

<!-- Committee filter chips -->
<div class="cal-chips" id="cal-chips">
    <button class="cal-chip {{ 'active' if not selected_committee }}" data-committee="">Alle</button>
    {% for c in committees %}
    <button class="cal-chip {{ 'active' if selected_committee == c }}" data-committee="{{ c }}">{{ c }}</button>
    {% endfor %}
</div>

<!-- ======= LIST VIEW (default) ======= -->
<div id="cal-list-view" style="{{ 'display:none' if view == 'grid' else '' }}">
    {% if not meetings %}
    <div class="cal-empty">Geen vergaderingen gevonden.</div>
    {% endif %}
</div>

<!-- ======= GRID VIEW (toggle) ======= -->
<div id="cal-grid-view" style="{{ '' if view == 'grid' else 'display:none' }}">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:0.75rem;">
        <div style="display:flex;align-items:center;gap:0.5rem;">
            <select id="select-month-grid" aria-label="Maand">
                <option value="0">Januari</option>
                <option value="1">Februari</option>
                <option value="2">Maart</option>
                <option value="3">April</option>
                <option value="4">Mei</option>
                <option value="5">Juni</option>
                <option value="6">Juli</option>
                <option value="7">Augustus</option>
                <option value="8">September</option>
                <option value="9">Oktober</option>
                <option value="10">November</option>
                <option value="11">December</option>
            </select>
            <button id="btn-today" class="btn-secondary btn" style="padding:0.2rem 0.6rem;font-size:0.8rem;border-radius:4px;">Vandaag</button>
        </div>
        <div>
            <button id="btn-prev" class="btn-secondary btn" style="padding:0.3rem 0.8rem;font-size:0.85rem;">&larr;</button>
            <button id="btn-next" class="btn-secondary btn" style="padding:0.3rem 0.8rem;font-size:0.85rem;">&rarr;</button>
        </div>
    </div>
    <div id="calendar-grid-container" class="cal-grid-container"></div>
</div>

<script type="application/json" id="meetings-data">{{ meetings | tojson | safe }}</script>

<script>
(function() {
    'use strict';

    /* ── Data ────────────────────────────────────── */
    const meetings = JSON.parse(document.getElementById('meetings-data').textContent);
    const selectedYear = Number('{{ selected_year | default(2026) }}');
    const selectedMonthParam = '{{ selected_month }}';
    const now = new Date();

    /* ── Dutch month names & helpers ──────────────── */
    const MONTHS_NL = ['januari','februari','maart','april','mei','juni',
                       'juli','augustus','september','oktober','november','december'];
    const DAYS_SHORT = ['Ma','Di','Wo','Do','Vr','Za','Zo'];

    function fmtDateNL(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        const day = d.getDate();
        const month = MONTHS_NL[d.getMonth()];
        return day + ' ' + month;
    }

    function fmtDateFull(isoStr) {
        if (!isoStr) return '';
        const d = new Date(isoStr);
        return d.getDate() + ' ' + MONTHS_NL[d.getMonth()] + ' ' + d.getFullYear();
    }

    /* ── URL state ──────────────────────────────── */
    function getParams() {
        return new URLSearchParams(window.location.search);
    }

    function setParam(key, value) {
        const p = getParams();
        if (value) p.set(key, value);
        else p.delete(key);
        history.replaceState(null, '', '/calendar' + (p.toString() ? '?' + p.toString() : ''));
    }

    /* ── Date grouping ──────────────────────────── */
    function dateGroupLabel(isoStr) {
        if (!isoStr) return 'Onbekend';
        const d = new Date(isoStr);
        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
        const meetDate = new Date(d.getFullYear(), d.getMonth(), d.getDate());
        const diff = (meetDate - today) / 86400000;

        if (diff === 0) return 'Vandaag';
        if (diff === 1) return 'Morgen';
        if (diff === -1) return 'Gisteren';
        if (diff > 1 && diff <= 7) return 'Deze week';
        if (diff > 7 && diff <= 14) return 'Volgende week';
        if (diff < -1 && diff >= -7) return 'Vorige week';

        return MONTHS_NL[d.getMonth()].charAt(0).toUpperCase()
             + MONTHS_NL[d.getMonth()].slice(1) + ' ' + d.getFullYear();
    }

    /* ── List view rendering ──────────────────── */
    const listView = document.getElementById('cal-list-view');

    function renderList(data) {
        listView.innerHTML = '';
        if (!data || data.length === 0) {
            listView.innerHTML = '<div class="cal-empty">Geen vergaderingen gevonden.</div>';
            return;
        }

        let currentGroup = null;

        data.forEach(function(m) {
            const group = dateGroupLabel(m.start_date);
            if (group !== currentGroup) {
                currentGroup = group;
                const header = document.createElement('div');
                header.className = 'cal-date-group';
                const h3 = document.createElement('h3');
                h3.textContent = group;
                header.appendChild(h3);
                listView.appendChild(header);
            }

            const details = document.createElement('details');
            details.className = 'cal-meeting';

            const summary = document.createElement('summary');

            const dateSpan = document.createElement('span');
            dateSpan.className = 'cal-meeting-date';
            dateSpan.textContent = fmtDateNL(m.start_date);
            summary.appendChild(dateSpan);

            const nameSpan = document.createElement('span');
            nameSpan.className = 'cal-meeting-name';
            const nameLink = document.createElement('a');
            nameLink.href = '/meeting/' + m.id;
            nameLink.textContent = m.name || 'Vergadering';
            nameSpan.appendChild(nameLink);
            summary.appendChild(nameSpan);

            if (m.committee) {
                const commSpan = document.createElement('span');
                commSpan.className = 'cal-meeting-committee';
                commSpan.textContent = m.committee;
                summary.appendChild(commSpan);
            }

            const metaParts = [];
            if (m.agenda_item_count) metaParts.push(m.agenda_item_count + ' agendapunten');
            if (m.doc_count) metaParts.push(m.doc_count + ' documenten');
            if (metaParts.length) {
                const metaSpan = document.createElement('span');
                metaSpan.className = 'cal-meeting-meta';
                metaSpan.textContent = metaParts.join(' \u00B7 ');
                summary.appendChild(metaSpan);
            }

            details.appendChild(summary);

            // Expandable body
            const body = document.createElement('div');
            body.className = 'cal-meeting-body';
            if (m.agenda_preview && m.agenda_preview.length > 0) {
                const ul = document.createElement('ul');
                m.agenda_preview.forEach(function(title) {
                    const li = document.createElement('li');
                    li.textContent = title;
                    ul.appendChild(li);
                });
                body.appendChild(ul);
                if (m.agenda_item_count > 5) {
                    const more = document.createElement('div');
                    more.className = 'cal-more';
                    more.textContent = '... en nog ' + (m.agenda_item_count - 5) + ' agendapunten';
                    body.appendChild(more);
                }
            } else {
                const p = document.createElement('p');
                p.style.margin = '0';
                p.style.color = '#999';
                p.textContent = 'Geen agendapunten beschikbaar.';
                body.appendChild(p);
            }
            details.appendChild(body);
            listView.appendChild(details);
        });
    }

    /* ── Client-side filtering ────────────────── */
    let activeCommittee = '{{ selected_committee }}';
    let searchTerm = '{{ search_query }}';
    let debounceTimer = null;

    function filteredMeetings() {
        return meetings.filter(function(m) {
            if (activeCommittee && m.committee) {
                if (m.committee.toLowerCase().indexOf(activeCommittee.toLowerCase()) === -1) return false;
            } else if (activeCommittee && !m.committee) {
                return false;
            }
            if (searchTerm) {
                const q = searchTerm.toLowerCase();
                const haystack = ((m.name || '') + ' ' + (m.committee || '')).toLowerCase();
                if (haystack.indexOf(q) === -1) return false;
            }
            return true;
        });
    }

    function applyFilters() {
        setParam('committee', activeCommittee);
        setParam('search', searchTerm);
        renderList(filteredMeetings());
    }

    /* Filter chips */
    document.getElementById('cal-chips').addEventListener('click', function(e) {
        const chip = e.target.closest('.cal-chip');
        if (!chip) return;
        activeCommittee = chip.dataset.committee;
        document.querySelectorAll('.cal-chip').forEach(function(c) { c.classList.remove('active'); });
        chip.classList.add('active');
        applyFilters();
    });

    /* Search with 250ms debounce */
    document.getElementById('cal-search').addEventListener('input', function(e) {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(function() {
            searchTerm = e.target.value.trim();
            applyFilters();
        }, 250);
    });

    /* Year select */
    document.getElementById('select-year').addEventListener('change', function(e) {
        const p = getParams();
        p.set('year', e.target.value);
        p.delete('month');
        window.location.href = '/calendar?' + p.toString();
    });

    /* ── View toggle ─────────────────────────── */
    const btnList = document.getElementById('btn-view-list');
    const btnGrid = document.getElementById('btn-view-grid');
    const gridView = document.getElementById('cal-grid-view');

    function showView(view) {
        if (view === 'grid') {
            listView.style.display = 'none';
            gridView.style.display = '';
            btnGrid.classList.add('active');
            btnList.classList.remove('active');
            setParam('view', 'grid');
            renderCalendarGrid();
        } else {
            gridView.style.display = 'none';
            listView.style.display = '';
            btnList.classList.add('active');
            btnGrid.classList.remove('active');
            setParam('view', '');
        }
    }

    btnList.addEventListener('click', function() { showView('list'); });
    btnGrid.addEventListener('click', function() { showView('grid'); });

    /* ── Grid view (legacy) ──────────────────── */
    let initialMonth;
    if (selectedMonthParam && selectedMonthParam !== 'None') {
        initialMonth = Number(selectedMonthParam);
    } else {
        initialMonth = (now.getFullYear() === selectedYear) ? now.getMonth() : 0;
    }
    let currentDate = new Date(selectedYear, initialMonth, 1);

    const selectMonthGrid = document.getElementById('select-month-grid');

    function updateGridSelects() {
        selectMonthGrid.value = currentDate.getMonth();
    }

    function renderCalendarGrid() {
        const gc = document.getElementById('calendar-grid-container');
        if (!gc) return;
        gc.innerHTML = '';
        const year = currentDate.getFullYear();
        const month = currentDate.getMonth();
        updateGridSelects();

        const firstDay = new Date(year, month, 1).getDay();
        const adjustedFirst = firstDay === 0 ? 6 : firstDay - 1;
        const daysInMonth = new Date(year, month + 1, 0).getDate();

        const dayOcc = new Array(7).fill(false);
        for (let d = 1; d <= daysInMonth; d++) {
            const ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            if (Array.isArray(meetings) && meetings.some(function(mm){return mm.start_date && mm.start_date.startsWith(ds);})) {
                dayOcc[(adjustedFirst + d - 1) % 7] = true;
            }
        }

        gc.style.gridTemplateColumns = dayOcc.map(function(b){return b?'1.8fr':'0.6fr';}).join(' ');

        DAYS_SHORT.forEach(function(dn, idx) {
            const dh = document.createElement('div');
            dh.className = 'cal-grid-header' + (dayOcc[idx] ? ' busy' : '');
            dh.textContent = dn;
            gc.appendChild(dh);
        });

        for (let i = 0; i < adjustedFirst; i++) {
            const e = document.createElement('div');
            e.className = 'cal-grid-day-empty';
            gc.appendChild(e);
        }

        for (let d = 1; d <= daysInMonth; d++) {
            const dayDiv = document.createElement('div');
            const ds = year + '-' + String(month+1).padStart(2,'0') + '-' + String(d).padStart(2,'0');
            const fm = Array.isArray(meetings) ? meetings.filter(function(mm){return mm.start_date && mm.start_date.startsWith(ds);}) : [];
            const hasMeetings = fm.length > 0;

            dayDiv.className = 'cal-grid-day' + (hasMeetings ? ' has-meetings' : '');
            const isToday = now.getFullYear()===year && now.getMonth()===month && now.getDate()===d;
            if (isToday) dayDiv.classList.add('today');

            const dayNum = document.createElement('div');
            dayNum.className = 'cal-grid-day-number';
            dayNum.textContent = d;
            dayDiv.appendChild(dayNum);

            fm.forEach(function(mm) {
                const link = document.createElement('a');
                link.href = '/meeting/' + mm.id;
                link.textContent = mm.name;
                link.title = mm.name;
                link.className = 'cal-grid-meeting-link';
                dayDiv.appendChild(link);
            });

            gc.appendChild(dayDiv);
        }

        var totalCells = adjustedFirst + daysInMonth;
        var pad = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
        for (var p = 0; p < pad; p++) {
            var emp = document.createElement('div');
            emp.className = 'cal-grid-day-empty';
            gc.appendChild(emp);
        }
    }

    function changeMonth(delta) {
        currentDate.setMonth(currentDate.getMonth() + delta);
        if (currentDate.getFullYear() !== selectedYear) {
            window.location.href = '/calendar?year=' + currentDate.getFullYear() + '&month=' + currentDate.getMonth() + '&view=grid';
        } else {
            renderCalendarGrid();
        }
    }

    document.getElementById('btn-prev').addEventListener('click', function(){changeMonth(-1);});
    document.getElementById('btn-next').addEventListener('click', function(){changeMonth(1);});
    document.getElementById('btn-today').addEventListener('click', function() {
        var ty = now.getFullYear(), tm = now.getMonth();
        if (ty !== selectedYear) {
            window.location.href = '/calendar?year=' + ty + '&month=' + tm + '&view=grid';
        } else {
            currentDate = new Date(ty, tm, 1);
            renderCalendarGrid();
        }
    });
    selectMonthGrid.addEventListener('change', function(e) {
        var nm = parseInt(e.target.value);
        currentDate.setMonth(nm);
        if (currentDate.getFullYear() !== selectedYear) {
            window.location.href = '/calendar?year=' + currentDate.getFullYear() + '&month=' + nm + '&view=grid';
        } else {
            renderCalendarGrid();
        }
    });

    /* ── Init ─────────────────────────────────── */
    renderList(filteredMeetings());
    if ('{{ view }}' === 'grid') renderCalendarGrid();
})();
</script>
{% endblock %}

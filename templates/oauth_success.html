{% extends "base.html" %}

{% block content %}
<meta http-equiv="refresh" content="2;url={{ redirect_url }}">

<div class="auth-container auth-container--wide auth-container--center">
    <div class="oauth-checkmark">&check;</div>
    <h2>Autorisatie geslaagd</h2>
    <p class="subtitle">
        U heeft <strong>{{ client_name }}</strong> toegang verleend tot uw NeoDemos account.
    </p>

    <div class="oauth-client-info">
        De verbinding is klaar. U wordt automatisch teruggestuurd&hellip;
    </div>

    <p class="oauth-redirect-note">
        Gebeurt er niets? Klik hieronder.
    </p>

    <div class="oauth-btn-row">
        <a class="btn btn-primary" href="{{ redirect_url }}">Terug naar {{ client_name }}</a>
        <a class="btn btn-ghost" href="/">NeoDemos home</a>
    </div>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="admin-layout">
  <aside class="admin-sidebar">
    <h3>Beheer</h3>
    <nav class="admin-nav">
      <a href="/admin" class="{% if active == 'dashboard' %}active{% endif %}">Dashboard</a>
      <a href="/admin/content" class="{% if active == 'content' %}active{% endif %}">Inhoud</a>
      <a href="/admin/users" class="{% if active == 'users' %}active{% endif %}">Gebruikers</a>
      <a href="/admin/tokens" class="{% if active == 'tokens' %}active{% endif %}">Tokens</a>
      <a href="/admin/pages" class="{% if active == 'pages' %}active{% endif %}">Pagina's</a>
      <a href="/admin/settings" class="{% if active == 'settings' %}active{% endif %}">Instellingen</a>
    </nav>
  </aside>
  <section class="admin-content">
    <h2>{{ admin_title }}</h2>
    {% block admin_body %}{% endblock %}
  </section>
</div>
{% endblock %}

{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <h1>Inloggen</h1>
    <p class="subtitle">Log in om toegang te krijgen tot NeoDemos.</p>

    {% if error %}
    <div class="auth-error">{{ error }}</div>
    {% endif %}

    {% if success %}
    <div class="auth-success">{{ success }}</div>
    {% endif %}

    <form class="auth-form" method="POST" action="/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="email" required autocomplete="email"
                   value="{{ email or '' }}" placeholder="uw@email.nl">
        </div>
        <div class="form-group">
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" name="password" required autocomplete="current-password"
                   placeholder="Uw wachtwoord">
        </div>
        <button type="submit" class="btn btn-primary auth-submit">Inloggen</button>
    </form>

    <div class="auth-link">
        Nog geen account? <a href="/register">Registreer hier</a>
    </div>
</div>
{% endblock %}

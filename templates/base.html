<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    {% block meta %}{% endblock %}
    <title>{% block title %}{{ title }}{% endblock %} | NeoDemos</title>
    <link rel="icon" type="image/x-icon" href="/static/images/favicon.ico?v={{ version_label }}">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/images/favicon-16.png?v={{ version_label }}">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/images/favicon-32.png?v={{ version_label }}">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/images/apple-touch-icon.png?v={{ version_label }}">
    <meta name="theme-color" content="#042825">
    <link rel="stylesheet" href="/static/dist/main.css?v={{ version_label }}">
    {% block styles %}{% endblock %}
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body class="{% block body_class %}{% endblock %}">
    {% include 'partials/_nav.html' %}
    {% block hero %}{% endblock %}
    <main>
        {% block content %}
        {% endblock %}
    </main>
    {% include 'partials/_footer.html' %}
    <script type="module" src="/static/dist/app.js?v={{ version_label }}"></script>
    <script src="/static/js/calendar-mini-enhancer.js?v={{ version_label }}" defer></script>
    <script type="module" src="/static/js/nd-answer.js"></script>
    <script type="module" src="/static/js/nd-analyse.js"></script>
    {% block extra_scripts %}
    {% endblock %}
</body>

</html>

{% extends "base.html" %}

{% block content %}
<style>
    .auth-container {
        max-width: 420px;
        margin: 4rem auto;
        background: #fff;
        padding: 2.5rem;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
    }
    .auth-container h2 { margin-bottom: 0.5rem; color: var(--secondary-color); }
    .auth-container .subtitle { color: #718096; margin-bottom: 2rem; font-size: 0.95rem; }
    .auth-form .form-group { margin-bottom: 1.25rem; }
    .auth-form label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.9rem; }
    .auth-form input[type="email"],
    .auth-form input[type="password"] {
        width: 100%; padding: 0.65rem 0.75rem; border: 1px solid #e2e8f0;
        border-radius: 6px; font-size: 1rem;
    }
    .auth-form button { width: 100%; padding: 0.75rem; background: var(--primary-color);
        color: #fff; border: none; border-radius: 6px; font-size: 1rem; cursor: pointer; }
    .auth-form button:hover { opacity: 0.9; }
    .error-msg { background: #fed7d7; color: #c53030; padding: 0.75rem; border-radius: 6px;
        margin-bottom: 1rem; font-size: 0.9rem; }
    .mcp-badge { display: inline-block; background: #edf2f7; color: #4a5568; padding: 0.25rem 0.75rem;
        border-radius: 12px; font-size: 0.8rem; margin-bottom: 1rem; }
</style>

<div class="auth-container">
    <span class="mcp-badge">MCP Autorisatie</span>
    <h2>Inloggen</h2>
    <p class="subtitle">Log in om een externe AI-assistent toegang te geven tot NeoDemos.</p>

    {% if error %}
    <div class="error-msg">{{ error }}</div>
    {% endif %}

    <form class="auth-form" method="POST" action="/oauth/login">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <input type="hidden" name="client_id" value="{{ client_id }}">
        <input type="hidden" name="redirect_uri" value="{{ redirect_uri }}">
        <input type="hidden" name="state" value="{{ state }}">
        <input type="hidden" name="scope" value="{{ scope }}">
        <input type="hidden" name="code_challenge" value="{{ code_challenge }}">

        <div class="form-group">
            <label for="email">E-mailadres</label>
            <input type="email" id="email" name="email" required
                   value="{{ email|default('', true) }}" autofocus>
        </div>
        <div class="form-group">
            <label for="password">Wachtwoord</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Inloggen</button>
    </form>
</div>
{% endblock %}

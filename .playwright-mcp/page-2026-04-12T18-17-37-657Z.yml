    - generic [ref=e12]:
      - heading "Over NeoDemos" [level=1] [ref=e13]
      - paragraph [ref=e14]: De raadsinformatie was er altijd al. Wij maken haar vindbaar.
    - generic [ref=e15]:
      - blockquote [ref=e18]:
        - paragraph [ref=e19]: “Als raadslid had ik toegang tot alles — en toch klikte ik me een weg door honderden losse PDF’s om één antwoord te vinden. Dat kon beter.”
        - text: — Dennis Tak, oud-raadslid Rotterdam
      - generic [ref=e20]:
        - heading "Democratie werkt alleen als burgers en raadsleden dezelfde informatie hebben" [level=2] [ref=e21]
        - paragraph [ref=e22]: "De Rotterdamse gemeenteraad produceert duizenden documenten per jaar: moties, amendementen, notulen, begrotingen, commissieverslagen. Die zijn allemaal openbaar — maar in de praktijk ontoegankelijk. Ze staan verspreid over portalen, in PDF-formaat, zonder samenhang."
        - paragraph [ref=e23]: NeoDemos maakt die informatie doorzoekbaar, analyseerbaar en begrijpelijk. Niet door te versimpelen, maar door verbanden zichtbaar te maken die er altijd al waren.
      - generic [ref=e24]:
        - heading "Hoe het begon" [level=2] [ref=e25]
        - paragraph [ref=e26]: NeoDemos is ontstaan uit frustratie. Als gemeenteraadslid in Rotterdam merkte oprichter Dennis Tak dat essentiële informatie weliswaar openbaar was, maar in de praktijk onvindbaar. Dossiers die drie jaar eerder waren behandeld, beloftes uit coalitieakkoorden, stemmingen over vergelijkbare moties — het kostte uren om de puzzelstukjes bij elkaar te zoeken.
        - paragraph [ref=e27]: Dat moest anders. NeoDemos combineert meer dan 90.000 raadsdocumenten uit de periode 2002 tot heden met kunstmatige intelligentie, zodat elke vraag over wat de gemeente deed, besloot of beloofde direct antwoord krijgt — met bronvermelding.
      - generic [ref=e28]:
        - heading "Wat gebruikers zeggen" [level=2] [ref=e29]
        - blockquote [ref=e30]:
          - paragraph [ref=e31]: “Dit spaarde me twee uur voorbereiding.”
          - text: — Raadslid, Rotterdam
      - generic [ref=e32]:

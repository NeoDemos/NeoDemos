# Kamal deployment configuration for NeoDemos
# Docs: https://kamal-deploy.org/docs/configuration/

service: neodemos
image: neodemos/neodemos

servers:
  web:
    hosts:
      - 178.104.137.168
    # Note: no `options.network` override — let the container join the default
    # `kamal` network so kamal-proxy can resolve it by container name.
    proxy:
      # kamal-proxy is the sole public reverse proxy on 80/443, with automatic
      # Let's Encrypt certs for all four TLDs. The `.eu` variants are routed
      # into the app and 301-redirected to neodemos.nl by
      # CanonicalHostRedirectMiddleware in main.py (kamal-proxy has no native
      # cross-TLD redirect feature).
      ssl: true
      hosts:
        - neodemos.nl
        - www.neodemos.nl
        - neodemos.eu
        - www.neodemos.eu
      app_port: 8000
      healthcheck:
        path: /up
        interval: 3
        timeout: 10

  # MCP as a Kamal service role (not an accessory). This gives us blue-green
  # zero-downtime deploys via kamal-proxy: new container boots, passes /up,
  # proxy atomically cuts traffic, old drains. Previous accessory setup caused
  # a 10–15s stop/start outage on every `kamal accessory reboot mcp` — a hole
  # in the SLO now that user traffic is growing (promoted 2026-04-14).
  mcp:
    hosts:
      - 178.104.137.168
    cmd: "python mcp_server_v3.py --http --port 8001"
    proxy:
      ssl: true
      hosts:
        - mcp.neodemos.nl
        - mcp.neodemos.eu
      app_port: 8001
      healthcheck:
        path: /up
        interval: 3
        timeout: 10
    env:
      clear:
        # Override web role's PORT=8000. Dockerfile HEALTHCHECK curls :$PORT/up,
        # so this must match the uvicorn bind port for the MCP process.
        PORT: "8001"
        MCP_BASE_URL: https://mcp.neodemos.nl
        NEODEMOS_BASE_URL: https://neodemos.nl
      # DB_*, QDRANT_URL, and secrets (DB_PASSWORD, GEMINI_API_KEY,
      # NEBIUS_API_KEY, QDRANT_API_KEY) are inherited from the top-level env
      # block. Web-only secrets (SECRET_KEY, ORI_API_KEY, ADMIN_*, ANTHROPIC)
      # are also inherited — image is shared; MCP ignores what it doesn't use.
    options:
      memory: 1G

builder:
  arch: amd64

ssh:
  user: deploy
  keys:
    - ~/.ssh/neodemos_ed25519

registry:
  server: ghcr.io
  username: NeoDemos
  password:
    - KAMAL_REGISTRY_PASSWORD

# The FastAPI app takes ~15s to boot (DB pool init, Gemini AI service, scheduler).
# Kamal's default 30s is too short for the Docker HEALTHCHECK (interval=30s,
# start-period=10s) to produce a stable "healthy" readout in time.
deploy_timeout: 120

env:
  clear:
    NEODEMOS_CITY: rotterdam
    DB_HOST: neodemos-postgres
    DB_PORT: "5432"
    DB_NAME: neodemos
    DB_USER: postgres
    DB_POOL_SIZE: "10"
    DB_MAX_OVERFLOW: "20"
    QDRANT_URL: http://neodemos-qdrant:6333
    HOST: 0.0.0.0
    PORT: "8000"
    ENVIRONMENT: production
    DEBUG: "false"
    LOG_LEVEL: INFO
    DOMAIN: neodemos.nl
    ALLOWED_HOSTS: neodemos.nl,www.neodemos.nl,neodemos.eu,www.neodemos.eu,mcp.neodemos.nl,mcp.neodemos.eu
    # WS11 Phase 6 complete (2026-04-15): embedded_at backfill committed (1,641,224 rows).
    # Phase 2 re-enabled; scheduler will embed new docs + 2 NaN/Inf residuals (IDs 574026, 574283).
    DOCUMENT_PROCESSOR_PHASE2_ENABLED: "true"
  secret:
    - DB_PASSWORD
    - GEMINI_API_KEY
    - ANTHROPIC_API_KEY
    - NEBIUS_API_KEY
    - QDRANT_API_KEY
    - SECRET_KEY
    - ORI_API_KEY
    - ADMIN_EMAIL
    - ADMIN_PASSWORD

accessories:
  postgres:
    # NOTE 2026-04-11: postgres is currently docker-compose-managed
    # (docker-compose.prod.yml), NOT Kamal-managed. This accessory entry is
    # the declarative target for a future migration — keep it in sync with
    # the compose file so the migration doesn't regress. Before switching,
    # the volume name drift between compose (`neodemos_postgres_data`) and
    # this config (`neodemos-postgres-data`) must be reconciled or the new
    # container will come up with an empty database.
    #
    # Image must be pgvector/pgvector:pg16 — vanilla postgres:16 lacks the
    # vector shared library and pg_dump breaks on tables with vector columns.
    image: pgvector/pgvector:pg16
    host: 178.104.137.168
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: neodemos
        POSTGRES_USER: postgres
      secret:
        - DB_PASSWORD
    volumes:
      - neodemos-postgres-data:/var/lib/postgresql/data
    options:
      memory: 4G
      name: neodemos-postgres
      network: kamal

  qdrant:
    image: qdrant/qdrant:v1.13.2
    host: 178.104.137.168
    port: "127.0.0.1:6333:6333"
    env:
      clear:
        QDRANT__SERVICE__API_KEY: ""
    volumes:
      - /home/deploy/neodemos-data/qdrant_storage:/qdrant/storage
    options:
      memory: 12G
      name: neodemos-qdrant
      network: kamal

  # MCP was an accessory here until 2026-04-14. It has been promoted to a
  # service role (see `servers.mcp` above) so it gets blue-green zero-downtime
  # deploys via kamal-proxy, the same as the web service.

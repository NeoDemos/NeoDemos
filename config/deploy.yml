# Kamal deployment configuration for NeoDemos
# Docs: https://kamal-deploy.org/docs/configuration/

service: neodemos
image: neodemos/neodemos

servers:
  web:
    hosts:
      - 178.104.137.168
    # Note: no `options.network` override — let the container join the default
    # `kamal` network so kamal-proxy can resolve it by container name.
    proxy:
      # Phase 1 (HTTP-only verification, Caddy still owns 80/443): ssl disabled,
      # test via alternate ports set with `kamal proxy boot_config set --http-port 4444`.
      # Flip to `ssl: true` + full hosts list in Phase 3 once verified.
      ssl: false
      host: neodemos.nl
      app_port: 8000
      healthcheck:
        path: /up
        interval: 3
        timeout: 10

builder:
  arch: amd64

ssh:
  user: deploy
  keys:
    - ~/.ssh/neodemos_ed25519

registry:
  server: ghcr.io
  username: NeoDemos
  password:
    - KAMAL_REGISTRY_PASSWORD

# The FastAPI app takes ~15s to boot (DB pool init, Gemini AI service, scheduler).
# Kamal's default 30s is too short for the Docker HEALTHCHECK (interval=30s,
# start-period=10s) to produce a stable "healthy" readout in time.
deploy_timeout: 120

env:
  clear:
    NEODEMOS_CITY: rotterdam
    DB_HOST: neodemos-postgres
    DB_PORT: "5432"
    DB_NAME: neodemos
    DB_USER: postgres
    DB_POOL_SIZE: "10"
    DB_MAX_OVERFLOW: "20"
    QDRANT_URL: http://neodemos-qdrant:6333
    HOST: 0.0.0.0
    PORT: "8000"
    ENVIRONMENT: production
    DEBUG: "false"
    LOG_LEVEL: INFO
    DOMAIN: neodemos.nl
    ALLOWED_HOSTS: neodemos.nl,www.neodemos.nl,neodemos.eu,www.neodemos.eu,mcp.neodemos.nl,mcp.neodemos.eu
  secret:
    - DB_PASSWORD
    - GEMINI_API_KEY
    - NEBIUS_API_KEY
    - QDRANT_API_KEY
    - SECRET_KEY
    - ORI_API_KEY
    - ADMIN_EMAIL
    - ADMIN_PASSWORD

accessories:
  postgres:
    image: postgres:16
    host: 178.104.137.168
    port: "127.0.0.1:5432:5432"
    env:
      clear:
        POSTGRES_DB: neodemos
        POSTGRES_USER: postgres
      secret:
        - DB_PASSWORD
    volumes:
      - neodemos-postgres-data:/var/lib/postgresql/data
    options:
      memory: 4G
      name: neodemos-postgres
      network: kamal

  qdrant:
    image: qdrant/qdrant:v1.13.2
    host: 178.104.137.168
    port: "127.0.0.1:6333:6333"
    env:
      clear:
        QDRANT__SERVICE__API_KEY: ""
    volumes:
      - /home/deploy/neodemos-data/qdrant_storage:/qdrant/storage
    options:
      memory: 12G
      name: neodemos-qdrant
      network: kamal

  mcp:
    image: ghcr.io/neodemos/neodemos
    host: 178.104.137.168
    cmd: "python mcp_server_v3.py --http --port 8001"
    # Phase 1: same HTTP-only proxy model as the web service. kamal-proxy will
    # route mcp.neodemos.nl (via Host header in test) to this accessory.
    proxy:
      ssl: false
      host: mcp.neodemos.nl
      app_port: 8001
      healthcheck:
        path: /up
        interval: 3
        timeout: 10
    env:
      clear:
        DB_HOST: neodemos-postgres
        DB_PORT: "5432"
        DB_NAME: neodemos
        DB_USER: postgres
        QDRANT_URL: http://neodemos-qdrant:6333
        MCP_BASE_URL: https://mcp.neodemos.nl
        NEODEMOS_BASE_URL: https://neodemos.nl
      secret:
        - DB_PASSWORD
        - GEMINI_API_KEY
        - NEBIUS_API_KEY
        - QDRANT_API_KEY
    options:
      memory: 1G
      name: neodemos-mcp
      # No network override — let kamal-proxy see the accessory on the `kamal` network.

  caddy:
    image: caddy:2-alpine
    host: 178.104.137.168
    port: "80:80"
    options:
      publish:
        - "443:443"
      memory: 128M
      name: neodemos-caddy
      network: neodemos_neodemos-network
    volumes:
      - /home/deploy/neodemos-config/Caddyfile:/etc/caddy/Caddyfile:ro
      - neodemos-caddy-data:/data
      - neodemos-caddy-config:/config

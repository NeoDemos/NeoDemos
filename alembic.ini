# NeoDemos Alembic configuration
# ────────────────────────────────────────────────────────────────
# DB URL is set at runtime via env.py (reads DATABASE_URL or DB_* vars).
# Do NOT hardcode credentials here.

[alembic]
script_location = alembic
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Placeholder — overridden in env.py from environment variables.
sqlalchemy.url = driver://user:pass@localhost/dbname

prepend_sys_path = .
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S

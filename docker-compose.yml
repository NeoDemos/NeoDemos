services:
  # PostgreSQL Database - Stores all city data
  postgres:
    image: postgres:16
    container_name: neodemos-postgres
    environment:
      POSTGRES_DB: neodemos
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - neodemos-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Qdrant Vector Database - Stores embeddings for RAG
  qdrant:
    image: qdrant/qdrant:v1.13.2
    container_name: neodemos-qdrant
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./data/qdrant_storage:/qdrant/storage
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
    networks:
      - neodemos-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 12G

  # NeoDemos Web Application
  web:
    build: .
    container_name: neodemos-web
    environment:
      # City configuration - change to deploy different cities
      NEODEMOS_CITY: ${NEODEMOS_CITY:-rotterdam}

      # Database configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: neodemos
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      DB_POOL_SIZE: 10
      DB_MAX_OVERFLOW: 20

      # Qdrant configuration
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ${QDRANT_API_KEY:-}

      # API Keys
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      ORI_API_KEY: ${ORI_API_KEY:-}
      NEBIUS_API_KEY: ${NEBIUS_API_KEY}

      # Server configuration
      HOST: 0.0.0.0
      PORT: 8000
      ENVIRONMENT: ${ENVIRONMENT:-production}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}

    ports:
      - "127.0.0.1:8000:8000"

    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy

    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./logs:/app/logs

    networks:
      - neodemos-network

    restart: unless-stopped

    deploy:
      resources:
        limits:
          memory: 2G

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Caddy Reverse Proxy (auto-TLS and routing)
  caddy:
    image: caddy:2-alpine
    container_name: neodemos-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    networks:
      - neodemos-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  neodemos-network:
    driver: bridge
